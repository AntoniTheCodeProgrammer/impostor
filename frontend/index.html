<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impostor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #FAF5E6;
            color: #2D3748;
        }

        .btn-dark-custom {
            background-color: #2D3748;
            color: #FAF5E6;
            border: none;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.15s;
        }
        .btn-dark-custom:hover {
            background-color: #4A5568;
            color: #FAF5E6;
            transform: translateY(-2px);
        }

        .task-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(45, 55, 72, 0.12);
            border-radius: 12px;
        }

        #error-msg {
            color: #E53E3E;
            font-size: 0.9rem;
        }
    </style>
</head>

<body class="min-vh-100 d-flex flex-column justify-content-center align-items-center">

    <!-- ══ WIDOK LOGOWANIA ══ -->
    <main id="login-view" class="w-100" style="max-width: 360px;">
        <h1 class="fw-bold text-center mb-4">Impostor</h1>
        <div class="d-flex flex-column gap-2">
            <input id="username" type="text" class="form-control" placeholder="Nazwa użytkownika" required>
            <input id="password" type="password" class="form-control" placeholder="Hasło" required>
            <p id="error-msg" class="mb-0"></p>
            <button class="btn btn-dark-custom w-100" id="login-btn">Start</button>
        </div>
    </main>

    <!-- ══ WIDOK PO ZALOGOWANIU ══ -->
    <main id="logged-view" class="w-100 text-center" style="max-width: 360px; display: none;">
        <h1 class="fw-bold mb-3">Impostor</h1>
        <p id="greeting" class="fs-5 mb-1"></p>
        <p id="role-line" class="text-muted mb-3">Rola: <strong id="role-display">nieznana</strong></p>
        <hr class="task-divider">
        <h2 id="task-heading" class="fs-6 text-uppercase text-muted fw-semibold letter-spacing mb-3">Zadanie</h2>

        <div id="task-box" class="task-card p-3 mb-3" style="display:none; text-align:left;">
            <div class="d-flex align-items-center gap-2 mb-1">
                <span id="task-title" class="fw-bold fs-5"></span>
                <span id="task-group-badge" class="badge" style="background:#2D3748; color:#FAF5E6; font-size:0.75rem;"></span>
            </div>
            <p id="task-description" class="text-muted mb-0" style="font-size:0.9rem;"></p>
        </div>

        <p id="task-none" class="text-muted">brak</p>

        <!-- WYZWANIE -->
        <hr class="task-divider">
        <h2 id="challenge-heading" class="fs-6 text-uppercase text-muted fw-semibold letter-spacing mb-3">Wyzwanie</h2>

        <div id="challenge-box" class="task-card p-3 mb-3" style="display:none; text-align:left;">
            <h3 id="challenge-title" class="fw-bold fs-5 mb-1"></h3>
            <p id="challenge-description" class="text-muted mb-2" style="font-size:0.9rem;"></p>
            <p class="mb-0" style="font-size:0.85rem;"><span class="fw-semibold">Nagroda:</span> <span id="challenge-reward" class="text-success"></span></p>
        </div>
        <p id="challenge-none" class="text-muted">brak</p>

        <button id="logout-btn" class="btn btn-outline-secondary btn-sm mt-3">Wyloguj</button>
    </main>

    <script src="config.js"></script>
    <script>
        const API = window.API_URL;
        let ws = null;
        let pingInterval = null;

        function getUser() { return localStorage.getItem("username"); }
        function setUser(u) { localStorage.setItem("username", u); }
        function clearUser() {
            localStorage.removeItem("username");
            localStorage.removeItem("role");
            localStorage.removeItem("task");
            localStorage.removeItem("challenge");
        }
        function getRole() { return localStorage.getItem("role"); }
        function setRole(r) { localStorage.setItem("role", r); }
        function getTask() { const t = localStorage.getItem("task"); return t ? JSON.parse(t) : null; }
        function setTask(t) { localStorage.setItem("task", JSON.stringify(t)); }
        function getChallenge() { const c = localStorage.getItem("challenge"); return c ? JSON.parse(c) : null; }
        function setChallenge(c) { localStorage.setItem("challenge", JSON.stringify(c)); }

        function showTask(task) {
            const box = document.getElementById("task-box");
            const none = document.getElementById("task-none");
            if (!task) { box.style.display = "none"; none.style.display = ""; return; }

            document.getElementById("task-title").textContent = task.title || task.quest_title || "";
            document.getElementById("task-description").textContent = task.description || task.quest_description || "";

            const group = task.group ?? task.group_num ?? null;
            const badge = document.getElementById("task-group-badge");
            if (group) {
                badge.textContent = "gr. " + group;
                badge.style.display = "";
            } else {
                badge.style.display = "none";
            }

            box.style.display = "block";
            none.style.display = "none";
        }

        function showChallenge(c) {
            const box = document.getElementById("challenge-box");
            const none = document.getElementById("challenge-none");
            if (!c) { box.style.display = "none"; none.style.display = ""; return; }

            document.getElementById("challenge-title").textContent = c.title || "";
            document.getElementById("challenge-description").textContent = c.description || "";
            document.getElementById("challenge-reward").textContent = c.reward || "";

            box.style.display = "block";
            none.style.display = "none";
        }

        function connectWebSocket(username) {
            if (ws) { ws.close(); ws = null; }
            clearInterval(pingInterval);

            ws = new WebSocket(`${window.WS_URL}/ws/${username}`);

            ws.onmessage = (event) => {
                let msg;
                try { msg = JSON.parse(event.data); } catch { return; }

                if (msg.type === "kicked") {
                    clearUser();
                    ws.close(); ws = null;
                    clearInterval(pingInterval);
                    alert("Twoje konto zostało usunięte przez admina.");
                    render();
                } else if (msg.type === "role") {
                    setRole(msg.role);
                    document.getElementById("role-display").textContent = msg.role;
                } else if (msg.type === "task") {
                    setTask(msg);
                    showTask(msg);
                } else if (msg.type === "challenge") {
                    setChallenge(msg.challenge);
                    showChallenge(msg.challenge);
                } else if (msg.type === "challenge_removed") {
                    localStorage.removeItem("challenge");
                    showChallenge(null);
                }
            };

            ws.onclose = () => { ws = null; clearInterval(pingInterval); };

            ws.onopen = () => {
                pingInterval = setInterval(() => {
                    if (ws && ws.readyState === WebSocket.OPEN) ws.send("ping");
                }, 20000);
            };
        }

        function render() {
            const user = getUser();
            if (user) {
                document.getElementById("login-view").style.display = "none";
                document.getElementById("logged-view").style.display = "block";
                document.getElementById("greeting").textContent = `Cześć, ${user}!`;
                document.getElementById("role-display").textContent = getRole() || "nieznana";
                showTask(getTask());
                showChallenge(getChallenge());
                connectWebSocket(user);
            } else {
                document.getElementById("login-view").style.display = "block";
                document.getElementById("logged-view").style.display = "none";
            }
        }

        document.getElementById("login-btn").addEventListener("click", async () => {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const errEl = document.getElementById("error-msg");
            errEl.style.display = "none";

            if (!username || !password) {
                errEl.textContent = "Uzupełnij wszystkie pola";
                errEl.style.display = "block";
                return;
            }

            try {
                const res = await fetch(`${API}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password }),
                });

                if (!res.ok) {
                    errEl.textContent = (await res.json()).detail || "Błąd logowania";
                    errEl.style.display = "block";
                    return;
                }

                const data = await res.json();
                setUser(data.username);
                if (data.role) setRole(data.role);
                else localStorage.removeItem("role");
                if (data.task) setTask(data.task);
                else localStorage.removeItem("task");
                if (data.challenge) setChallenge(data.challenge);
                else localStorage.removeItem("challenge");
                render();
            } catch {
                errEl.textContent = "Nie można połączyć z serwerem";
                errEl.style.display = "block";
            }
        });

        document.getElementById("logout-btn").addEventListener("click", () => {
            if (ws) ws.close();
            clearInterval(pingInterval);
            clearUser();
            render();
        });

        render();
    </script>
</body>

</html>
